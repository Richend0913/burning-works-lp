<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>og-template — burning-works-lp (1200x630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
 body{margin:0;background:#333}
 .og{width:1200px;height:630px;position:relative;overflow:hidden;box-sizing:border-box;
   background:linear-gradient(160deg,#1a2130,#0d1017);font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;color:#eef2f7;
   display:flex;flex-direction:column;justify-content:center;padding:0 96px}
 .og::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 80% 0%,rgba(47,109,240,.18),transparent 60%)}
 .eyebrow{position:relative;z-index:1;color:#5b8df5;font-size:25px;font-weight:700;letter-spacing:.16em;
   display:flex;align-items:center;gap:18px;margin-bottom:34px}
 .eyebrow::before{content:"";width:44px;height:2px;background:currentColor;opacity:.7}
 h1{position:relative;z-index:1;margin:0;font-size:66px;font-weight:900;line-height:1.32;
   letter-spacing:.02em;font-feature-settings:"palt"}
 h1 .ph{display:inline-block}
 h1 .hl{background:linear-gradient(transparent 62%,rgba(47,109,240,.30) 62%);padding:0 .05em;color:#5b8df5}
 .sub{position:relative;z-index:1;margin-top:32px;font-size:29px;font-weight:500;color:#c2c8d2;letter-spacing:.03em}
 .brand{position:absolute;right:52px;bottom:38px;z-index:1;font-size:23px;font-weight:700;color:#8fa9d8;letter-spacing:.08em}
</style></head><body>
<div class="og">
  <div class="eyebrow">業務システム受託 ／ BURNING WORKS</div>
  <h1><span class="ph">紙とExcelの管理を、</span><br><span class="ph"><span class="hl">スマホで動く</span>システムに。</span></h1>
  <div class="sub">ムダな工数を削って短い納期・低コストで</div>
  <div class="brand">NEXT GROWTH ／ BURNING BROS.</div>
</div></body></html>
